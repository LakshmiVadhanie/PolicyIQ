name: CI — Test & RAGAS Evaluation Gate

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  USE_MOCK_LLM: "true"
  USE_MOCK_BIGQUERY: "true"
  APP_ENV: "development"
  GCP_PROJECT_ID: "mock-project-id"
  CONFIDENCE_THRESHOLD: "0.75"
  RAGAS_COMPOSITE_THRESHOLD: "0.70"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/ tests/ --select=E,F,W --ignore=E501

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/test_agents.py tests/test_api.py \
            -v --cov=app --cov-report=xml --cov-report=term-missing \
            --tb=short -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  ragas-gate:
    name: RAGAS Quality Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RAGAS evaluation gate
        run: |
          echo "Running RAGAS quality gate evaluation..."
          python -m pytest tests/test_evaluation.py -v --tb=short
          echo " RAGAS quality gate passed"

  integration-check:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: ragas-gate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start API server
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8080 &
          sleep 5

      - name: Test health endpoint
        run: curl -f http://localhost:8080/health

      - name: Test chat endpoint
        run: |
          curl -f -X POST http://localhost:8080/chat \
            -H "Content-Type: application/json" \
            -d '{"message": "What does my auto insurance cover?", "session_id": "ci-test-001"}'

      - name: Test webhook endpoint
        run: |
          curl -f -X POST http://localhost:8080/webhook \
            -H "Content-Type: application/json" \
            -d '{"text": "I need to file a claim for my car accident", "sessionInfo": {"session": "projects/test/sessions/ci-test"}}'
